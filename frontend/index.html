<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BITE.co — Login</title>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.12);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #1a1a2e;
      letter-spacing: -1px;
    }
    .logo span {
      color: #4361ee;
    }
    .logo p {
      color: #666;
      font-size: 0.875rem;
      margin-top: 4px;
    }
    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #4361ee;
    }
    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: #4361ee;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button[type="submit"]:hover { background: #3451d1; }
    button[type="submit"]:disabled { background: #aaa; cursor: not-allowed; }
    .error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.875rem;
      margin-bottom: 16px;
      display: none;
    }
    .hint {
      text-align: center;
      margin-top: 20px;
      font-size: 0.8rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>BITE<span>.co</span></h1>
      <p>Cloud Cost Management Platform</p>
    </div>
    <div class="error" id="errorMsg"></div>
    <form id="loginForm">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="usuario@empresa.co" required autocomplete="email" />
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
      <button type="submit" id="submitBtn">Iniciar sesión</button>
    </form>
    <p class="hint">Demo: empresa_a@bite.co / BiteCo2024! (ADMIN) · analyst@bite.co (ANALYST)</p>
  </div>

  <script>
    // Redirect to dashboard if already logged in
    if (localStorage.getItem('access_token')) {
      window.location.href = 'dashboard.html';
    }

    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Iniciando sesión…';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const resp = await fetch(`${CONFIG.AUTH_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await resp.json();

        if (!resp.ok) {
          showError(data.error || 'Error al iniciar sesión. Verifique sus credenciales.');
          return;
        }

        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('refresh_token', data.refresh_token || '');
        localStorage.setItem('user_email', email);
        localStorage.setItem('user_rol', data.rol || 'ANALYST');
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError('No se pudo conectar con el servidor. Intente nuevamente.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Iniciar sesión';
      }
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }
  </script>
</body>
</html>
